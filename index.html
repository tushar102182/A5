<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- daisy+tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- favicon -->
 <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

 <!-- Body font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- Font Awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


<!-- styles -->
 <style>
    *{
        font-family: "Geist", sans-serif;
    }


 </style>
 <link rel="stylesheet" href="./style.css">

</head>


<body class="bg-[#F8FAFC]">

<section >
<div class="min-h-screen grid items-center  mx-auto max-w-[500px]">
    

    <fieldset class="fieldset mx-auto space-y-3 shadow-sm bg-white border-base-300 rounded-box w-xs border p-4">
            <div class=" bg-white grid space-y-1 justify-center text-center">
        <img class="mx-auto w-[30%]" src="./assets/github-logo.png" alt="">
        <h2 class="font-bold text-xl">
            GitHub Issues Tracker
        </h2>

        <p class="text-[#64748B]">
Sign in to manage your issues
        </p>
    </div>
  

  <label class="label font-bold">Username</label>
  <input id="admin" type="text" class="input" placeholder="Enter admin" required />

  <label class="label font-bold">Password</label>
  <input id="password" minlength="8" maxlength="8" type="password" class="input" placeholder="Enter admin123" required />

  <button id="signin-btn" class="btn btn-primary mt-4">Sign In</button>
</fieldset>
</div>
</section>



    <!-- Scripts -->
     <script src="./js/script.js"></script>
     <script src="./js/home.js"></script>
</body>
</html>
